previews:
  generation: off

databases:
  - name: moviejet-db
    plan: free
    region: ohio

services:
  - type: web
    name: moviejet
    runtime: docker
    plan: free
    region: ohio
    branch: master
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: moviejet-db
          property: connectionString
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SESSION_SECRET
        generateValue: true
